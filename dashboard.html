<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmLink Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-success bg-success">
      <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold"> 🌾 FarmLink </span>

        <span class="text-white" id="location"> 📍 Detecting location... </span>
      </div>
    </nav>

    <div class="container mt-4">
      <h3>Hello, Farmer 👋</h3>

      <p>What would you like to do today?</p>

      <input
        type="text"
        class="form-control mb-4"
        placeholder="Search produce..."
      />

      <div class="row">
        <div class="col-6 mb-3">
          <div class="card shadow text-center p-3">
            <h1>🌽</h1>
            <h5>Grains</h5>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card shadow text-center p-3">
            <h1>🥕</h1>
            <h5>Vegetables</h5>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card shadow text-center p-3">
            <h1>🍎</h1>
            <h5>Fruits</h5>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card shadow text-center p-3">
            <h1>🐄</h1>
            <h5>Livestock</h5>
          </div>
        </div>
      </div>

      <h4 class="mt-4">Nearby Produce</h4>

<div id="nearbyProduce">
    <div class="card shadow mb-3">
        <div class="card-body">
            <h5>🍅 Tomatoes</h5>
            <p>₦25,000</p>
            <p>⭐⭐⭐⭐⭐</p>

            <button class="btn btn-success w-100">
                Contact Farmer
            </button>
        </div>
    </div>
</div>

<div class="text-center my-4">
    <a href="sell.html" class="btn btn-success btn-lg rounded-pill px-5">
        ➕ Sell Produce
    </a>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/dashboard.js"></script>
    <script src="js/location.js"></script>
  </body>
</html>
