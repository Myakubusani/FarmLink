<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmLink Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/dashboard.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>🌾 FarmLink</h1>

      <p class="subtitle">What would you like to do today?</p>

      <div class="dashboard-grid">
        <button class="menu-btn" onclick="goSell()">
          🌽
          <span>Sell Produce</span>
        </button>

        <button class="menu-btn" onclick="goBuy()">
          🛒
          <span>Buy Produce</span>
        </button>

        <button class="menu-btn" onclick="goRatings()">
          ⭐
          <span>Ratings</span>
        </button>

        <button class="menu-btn" onclick="goProfile()">
          👤
          <span>My Profile</span>
        </button>
      </div>
    </div>
  </body>
</html>
