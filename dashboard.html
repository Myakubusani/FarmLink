<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmLink Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-success">
      <div class="container">
        <span class="navbar-brand fw-bold">🌾 FarmLink</span>
        <span class="text-white" id="location">📍 Detecting location...</span>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
      <h2>Hello, Farmer 👋</h2>
      <p>Welcome back to FarmLink.</p>

      <!-- Search -->
      <input
        type="text"
        id="searchInput"
        class="form-control mb-4"
        placeholder="🔍 Search produce..."
      />

      <!-- Categories -->
      <div class="row">
        <div class="col-6 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h1>🌾</h1>
              <h5>Grains</h5>
            </div>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h1>🥕</h1>
              <h5>Vegetables</h5>
            </div>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h1>🍎</h1>
              <h5>Fruits</h5>
            </div>
          </div>
        </div>

        <div class="col-6 mb-3">
          <div class="card text-center shadow-sm">
            <div class="card-body">
              <h1>🐄</h1>
              <h5>Livestock</h5>
            </div>
          </div>
        </div>
      </div>

      <!-- Posted Products -->
      <h3 class="mt-4 mb-3">🌾 Nearby Produce</h3>

      <div id="nearbyProduce"></div>

      <!-- Sell Button -->
      <div class="d-grid mt-4">
        <a href="sell.html" class="btn btn-success btn-lg"> ➕ Sell Produce </a>
      </div>
    </div>

    <script src="js/dashboard.js"></script>

    <!-- Only include this if you already have location.js -->
    <script src="js/location.js"></script>
  </body>
</html>
