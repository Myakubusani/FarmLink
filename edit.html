<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Product</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="container py-4">
    <h2 class="mb-4">✏️ Edit Product</h2>

    <input
      id="farmerName"
      class="form-control mb-3"
      placeholder="Farmer Name"
    />

    <input id="location" class="form-control mb-3" placeholder="Location" />

    <input id="quantity" class="form-control mb-3" placeholder="Quantity" />

    <input
      id="price"
      type="number"
      class="form-control mb-3"
      placeholder="Price"
    />

    <button id="saveBtn" class="btn btn-success w-100">💾 Save Changes</button>

    <footer class="text-center mt-5 py-3 border-top">
      <small>© 2026 FarmLink | Connecting Farmers and Buyers</small>
    </footer>
  </body>
  <script src="js/language.js"></script>

  <script type="module" src="js/edit.js"></script>
</html>
