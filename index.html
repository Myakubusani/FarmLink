<HEAD
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FarmLink</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />

    <!-- Google Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <img src="images/logo.jpg" class="logo" alt="FarmLink Logo" />

      <h1 id="appName">🌾 FarmLink</h1>

      <p id="subtitle" class="subtitle">Connecting Farmers Directly With Buyers</p>

      <h2>Select Language</h2>

      <div class="language-grid">
        <button onclick="setLanguage('english')">
          🇬🇧
          <span>English</span>
        </button>

        <button onclick="setLanguage('hausa')">
          🇳🇬
          <span>Hausa</span>
        </button>

        <button onclick="setLanguage('yoruba')">
          🇳🇬
          <span>Yoruba</span>
        </button>

        <button onclick="setLanguage('igbo')">
          🇳🇬
          <span>Igbo</span>
        </button>

        <button onclick="setLanguage('pidgin')">
          🇳🇬
          <span>Pidgin</span>
        </button>
      </div>
    </div>
    
    <script src="js/language.js"></script>

    <script>
      function setLanguage(language) {
        localStorage.setItem("language", language);

        window.location.href = "login.html";
      }
      
     
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center mt-5 py-3 border-top">
    <small>© 2026 FarmLink | Connecting Farmers and Buyers</small>
</footer>  
   
  </body>
</html>
