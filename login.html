<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FarmLink Login</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <img src="images/logo.jpg" alt="farmlink logo" class="logo" />

      <h1 id="appName">🌾 FarmLink</h1>

      <h2 id="welcomeText">Welcome Back</h2>

      <p id="loginSubtitle" class="subtitle">Login with your phone number</p>
      <input
        type="tel"
        id="phone"
        placeholder="Phone Number"
        maxlength="11"
        class="input-box"
      />

      <input
        type="password"
        id="pin"
        placeholder="6-digit PIN"
        maxlength="6"
        class="input-box"
      />

      <button id="loginBtn" class="main-btn" onclick="login()">Login</button>

      <button
        id="createAccountBtn"
        class="secondary-btn"
        onclick="window.location = 'signup.html'"
      >
        Create Account
      </button>
    </div>

    <footer class="text-center mt-5 py-3 border-top">
      <small>© 2026 FarmLink | Connecting Farmers and Buyers</small>
    </footer>

    <script src="js/language.js"></script>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
