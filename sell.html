<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sell Produce - FarmLink</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/dashboard.css" />
  </head>

  <body class="bg-light">
    <nav class="navbar bg-success">
      <div class="container">
        <span class="navbar-brand text-white fw-bold"> 🌾 FarmLink </span>
      </div>
    </nav>

    <div class="container mt-4">
      <h2 class="fw-bold">What are you selling?</h2>

      <p>Select your produce.</p>

      <div class="row">
        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">🌽<br />Corn</button>
        </div>

        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">
            🍅<br />Tomatoes
          </button>
        </div>

        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">🥔<br />Yam</button>
        </div>

        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">🧅<br />Onion</button>
        </div>

        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">🌾<br />Rice</button>
        </div>

        <div class="col-4 mb-3">
          <button class="btn btn-light shadow w-100 p-3">🫘<br />Beans</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label"> Quantity </label>

        <input
          type="number"
          class="form-control"
          id="price"
          placeholder="Example: 25000"
        />
      </div>

      <div class="mb-3">
        <label class="form-label"> Price (₦) </label>

        <input
          type="number"
          class="form-control"
          id="quantity"
          placeholder="Example: 25000"
        />
      </div>

      <div class="d-grid gap-3">
        <button class="btn btn-warning btn-lg">🎤 Speak Description</button>

        <button class="btn btn-secondary btn-lg">📷 Upload Photo</button>

        <button id="postBtn" class="btn btn-success">🌾 Post Produce</button>
      </div>
    </div>

    <script src="js/sell.js"></script>
  </body>
</html>
